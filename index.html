<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missouri Professional ID Generator - 2026 Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=Roboto+Mono:wght@700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e2e8f0; font-family: 'Arimo', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 1200px; display: flex; flex-wrap: wrap; gap: 30px; }
        
        /* FORM PANEL */
        .form-panel { flex: 1; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); min-width: 350px; }
        .form-group { margin-bottom: 12px; }
        label { font-size: 11px; font-weight: bold; color: #cc1133; display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: #003366; }
        .btn-generate { background: #003366; color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 16px; }

        /* REAL ID CARD DESIGN */
        .preview-panel { flex: 1.5; display: flex; flex-direction: column; align-items: center; }
        .id-card { 
            width: 580px; height: 360px; background: #fdfdfa; border-radius: 20px; 
            position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            /* Microprint/Guilloche Texture Effect */
            background-image: 
                radial-gradient(circle at 70% 50%, rgba(200, 225, 255, 0.4) 0%, transparent 70%),
                url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
        }

        /* Top Header Missouri Official */
        .header-strip { 
            background: linear-gradient(90deg, #cc1133 0%, #ffffff 45%, #003366 100%); 
            height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px;
        }
        .state-name { color: white; font-size: 36px; font-weight: 900; letter-spacing: 1.5px; text-shadow: 1px 1px 3px rgba(0,0,0,0.4); }
        .doc-type { color: #003366; font-weight: 800; font-size: 15px; letter-spacing: 0.5px; }

        /* Real ID Gold Star */
        .gold-star { position: absolute; right: 18px; top: 12px; width: 35px; height: 35px; background: radial-gradient(circle, #fcd34d, #d97706); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); border: 1px solid #b45309; opacity: 0.95; }

        /* Watermark Seal */
        .seal-bg { position: absolute; right: 100px; top: 90px; width: 200px; opacity: 0.08; pointer-events: none; transform: rotate(-5deg); }

        /* Main Content Area */
        .card-content { display: flex; padding: 20px 25px; gap: 20px; z-index: 2; position: relative; }
        .photo-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .photo-box { width: 155px; height: 195px; border: 1px solid #94a3b8; border-radius: 8px; overflow: hidden; background: #f1f5f9; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .signature { font-family: 'Dancing Script', cursive; font-size: 18px; color: #1e293b; opacity: 0.8; width: 100%; text-align: left; padding-left: 5px; }
        
        .data-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 15px; }
        .field { border-bottom: 0.5px solid #e2e8f0; padding-bottom: 2px; }
        .f-label { font-size: 9px; color: #cc1133; font-weight: bold; text-transform: uppercase; letter-spacing: 0.3px; }
        .f-val { font-size: 14px; font-weight: 700; color: #0f172a; font-family: 'Roboto Mono', monospace; line-height: 1.2; }

        /* Ghost Image (Holographic Effect) */
        .ghost-img { 
            position: absolute; right: 35px; bottom: 80px; width: 85px; height: 110px; 
            opacity: 0.3; filter: grayscale(100%) contrast(130%) brightness(110%); pointer-events: none;
            border-radius: 8px; overflow: hidden; transform: rotate(-2deg);
        }
        .ghost-img img { width: 100%; height: 100%; object-fit: cover; }

        /* Laser Raised DOB at bottom */
        .laser-dob { 
            position: absolute; right: 25px; bottom: 25px; font-family: 'Roboto Mono', monospace;
            font-size: 26px; font-weight: 900; color: rgba(0,0,0,0.7); letter-spacing: 2px;
            text-shadow: 1px 1px 0px #fff, -1px -1px 0px #999; 
        }

        .donor-icon { position: absolute; right: 135px; bottom: 85px; width: 35px; opacity: 0.8; filter: drop-shadow(0px 0px 1px red); }
        
        #downloadBtn { margin-top: 25px; padding: 12px 30px; background: #22c55e; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
    </style>
</head>
<body>

<div class="container">
    <div class="form-panel">
        <h2 style="color:#003366; margin-bottom:20px; border-bottom: 2px solid #eee; padding-bottom:10px;">Security Data Entry</h2>
        <div class="form-group"><label>1,2 FULL NAME</label><input type="text" id="inName" value="HORNBEAK, ROBERTA ELAINE"></div>
        <div class="form-group"><label>4d DL NO. (DLT)</label><input type="text" id="inDL" value="T102310006"></div>
        <div class="form-group"><label>8 ADDRESS</label><input type="text" id="inAddr" value="378 E DEGRAFFENREID ST, SPRINGFIELD, MO 65810"></div>
        <div class="form-group"><label>3 DATE OF BIRTH (MM/DD/YYYY)</label><input type="text" id="inDOB" value="11/20/1946"></div>
        <div class="form-group"><label>4b EXPIRATION</label><input type="text" id="inEXP" value="11/20/2025"></div>
        <div class="form-group"><label>PHYSICALS (SEX / HGT / WGT)</label>
            <div style="display:flex; gap:10px">
                <input type="text" id="inSex" value="F" style="flex:0.5">
                <input type="text" id="inHgt" value="5'-03&quot;" style="flex:1">
                <input type="text" id="inWgt" value="138 lb" style="flex:1">
            </div>
        </div>
        <div class="form-group"><label>SECURE PHOTO UPLOAD</label><input type="file" id="fileIn" accept="image/*"></div>
        <button class="btn-generate" onclick="updateID()"><i class="fas fa-shield-alt"></i> GENERATE REAL ID</button>
    </div>

    <div class="preview-panel">
        <div class="id-card" id="idCard">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b2/Seal_of_Missouri.svg" class="seal-bg">
            
            <div class="gold-star"></div>

            <div class="header-strip">
                <div class="state-name">MISSOURI</div>
                <div class="doc-type">DRIVER LICENSE</div>
            </div>

            <div class="card-content">
                <div class="photo-area">
                    <div class="photo-box" id="mainPhoto"><img src="https://via.placeholder.com/155x195?text=Photo" alt=""></div>
                    <div class="signature" id="dSig">Roberta Elaine</div>
                </div>
                
                <div class="data-grid">
                    <div class="field" style="grid-column: span 2;"><span class="f-label">4d DL NO.</span><br><span class="f-val" id="dDL"></span></div>
                    <div class="field" style="grid-column: span 2;"><span class="f-label">1,2 NAME</span><br><span class="f-val" id="dName"></span></div>
                    <div class="field" style="grid-column: span 2;"><span class="f-label">8 ADDRESS</span><br><span class="f-val" id="dAddr" style="font-size:11px"></span></div>
                    <div class="field"><span class="f-label">3 DOB</span><br><span class="f-val" id="dDOB"></span></div>
                    <div class="field"><span class="f-label">4b EXP</span><br><span class="f-val" id="dEXP"></span></div>
                    <div class="field"><span class="f-label">15 SEX</span><br><span class="f-val" id="dSex"></span></div>
                    <div class="field"><span class="f-label">16 HGT</span><br><span class="f-val" id="dHgt"></span></div>
                </div>
            </div>

            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Heart_Circle.svg" class="donor-icon">

            <div class="ghost-img" id="ghostPhoto"><img src="https://via.placeholder.com/155x195" alt=""></div>

            <div class="laser-dob" id="laserDOB">11/20/46</div>
        </div>
        <button id="downloadBtn"><i class="fas fa-camera"></i> SAVE HIGH-RES IMAGE</button>
    </div>
</div>

<script>
    function updateID() {
        let name = document.getElementById('inName').value.toUpperCase();
        document.getElementById('dName').innerText = name;
        document.getElementById('dDL').innerText = document.getElementById('inDL').value.toUpperCase();
        document.getElementById('dAddr').innerText = document.getElementById('inAddr').value.toUpperCase();
        document.getElementById('dDOB').innerText = document.getElementById('inDOB').value;
        document.getElementById('dEXP').innerText = document.getElementById('inEXP').value;
        document.getElementById('dSex').innerText = document.getElementById('inSex').value;
        document.getElementById('dHgt').innerText = document.getElementById('inHgt').value;
        
        // Dynamic Signature (Mock)
        let sigName = name.split(',')[1] || name.split(',')[0];
        document.getElementById('dSig').innerText = sigName.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());

        // Laser Raised DOB Logic
        let dob = document.getElementById('inDOB').value;
        if(dob.includes('/')) {
            let parts = dob.split('/');
            if(parts.length === 3) {
                document.getElementById('laserDOB').innerText = parts[0] + '/' + parts[1] + '/' + parts[2].substring(2);
            }
        }
    }

    document.getElementById('fileIn').addEventListener('change', function(e) {
        if (e.target.files && e.target.files[0]) {
            let reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById('mainPhoto').innerHTML = `<img src="${ev.target.result}">`;
                document.getElementById('ghostPhoto').innerHTML = `<img src="${ev.target.result}">`;
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
        this.innerHTML = "Processing...";
        html2canvas(document.querySelector("#idCard"), {
            scale: 4, // Higher scale for 100% clarity
            useCORS: true,
            backgroundColor: null
        }).then(canvas => {
            let link = document.createElement('a');
            link.download = 'MO_License_Full_Ready.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            this.innerHTML = '<i class="fas fa-camera"></i> SAVE HIGH-RES IMAGE';
        });
    });

    // Run on start
    updateID();
</script>

</body>
                                                                                  </html>
